name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/apps/FlappyNifty
            git fetch origin master:refs/remotes/origin/master
            git checkout -B master origin/master
            /root/.local/bin/uv sync --frozen
            systemctl restart flappynifty
            systemctl is-active --quiet flappynifty
            for attempt in {1..20}; do
              if curl --fail --silent --unix-socket /run/flappynifty.sock \
                http://localhost/games/flappynifty/ > /dev/null; then
                exit 0
              fi
              sleep 0.5
            done
            echo "Flappy Nifty did not become healthy after restart" >&2
            exit 1
